<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J.A.R.V.I.S. // Standalone Holographic Visualizer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Visualizer container that fits 100% of its parent -->

  </div>

  <script src="app.js"></script>
</body>
</html>
